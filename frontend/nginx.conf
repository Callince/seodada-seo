server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache forever. A missing chunk must
    # 404 (NOT fall back to index.html) so stale clients fail fast and recover.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Blog/webstory imagery — content, not hashed builds, so cacheable for a
    # week (not immutable: an admin can re-upload under the same name).
    location /content-assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    # Sitemap is generated from the database so new posts and stories appear
    # the moment they are published. Exact-match, so it wins over the SPA
    # fallback below; it must be served from the root because a sitemap only
    # covers URLs at or below its own path.
    location = /sitemap.xml {
        proxy_pass http://api:8000/api/v1/public/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all client routes resolve to index.html. index.html must
    # never be cached, or returning browsers keep referencing deleted chunks
    # after a deploy ("Failed to fetch dynamically imported module").
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Proxy API calls to the FastAPI service.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
