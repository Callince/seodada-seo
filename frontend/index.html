<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#273879" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!--
      Fallback title ONLY. Every public page renders its own title, description,
      canonical and OG/Twitter set through <Seo> (src/lib/seo.tsx), and the
      prerender step replaces this element per route.

      Nothing per-page may be declared here. React 19 hoists rendered head tags
      but does not dedupe them against static ones, so a description or og:title
      in this file would survive alongside the page's own and be the FIRST of
      the pair — which is the one a crawler reads. This title stays because the
      authenticated app renders no <Seo> at all and would otherwise be untitled.
    -->
    <title>seodada — AI SEO Platform</title>

    <!-- Site-wide constants, identical on every page, so safe to declare once. -->
    <meta property="og:site_name" content="seodada" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
