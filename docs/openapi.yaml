openapi: 3.1.0
info:
  title: DataForSEO Intelligence API
  version: 1.0.0
  summary: Multi-tenant SEO research API on top of DataForSEO v3.
  description: 'A multi-tenant SaaS SEO platform. Every billed call flows through a three-tier cost engine
    (Redis -> Postgres -> upstream) with singleflight coalescing and stale-while-revalidate, so repeat
    reads are $0.


    **Conventions**

    - All endpoints are versioned under `/api/v1`.

    - Every data response embeds a `meta` object (`from_cache`, `cost_cents`, `source`, `latency_ms`).

    - All money values are integer **USD cents**.

    - Auth is JWT Bearer; access tokens are short-lived, refreshed via `/auth/refresh`.

    - Per-organization monthly quota is enforced before any billed call (HTTP 402).'
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Proprietary
