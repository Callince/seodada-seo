      type: object
      description: RFC 7807 Problem Details (media type `application/problem+json`).
      required:
      - type
      - title
      - status
      - detail
      properties:
        type:
          type: string
          format: uri
          examples:
          - https://docs.seo-intelligence.app/errors/quota-exceeded
        title:
          type: string
          examples:
          - Payment Required
        status:
          type: integer
          examples:
          - 402
        detail:
          type: string
          examples:
          - Monthly organization quota exhausted.
        instance:
          type: string
          examples:
          - /api/v1/serp/ranking
        errors:
          type: array
          description: Field-level validation failures (422 only).
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
