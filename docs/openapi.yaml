      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
    ValidationFailed:
      description: Request body or parameters failed validation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
servers:
- url: http://localhost:8000
  description: Local development
- url: https://api.example.com
  description: Production
tags:
- name: auth
  description: Registration, login, token refresh, and the current user/org.
- name: serp
  description: Google SERP rankings with brand enrichment and People Also Ask.
- name: keywords
  description: Search volume, trends (Google/DataForSEO/seasonal), suggestions, related, ideas, and PAA.
- name: domains
  description: 'Domain-level analytics: ranked keywords, competitors, overview, and keyword gap.'
- name: onpage
  description: On-page content scoring, audits, SERP snippet preview, and competitive benchmarking.
- name: content
  description: Sentiment, connotations, and citations for a keyword or brand.
- name: rank
  description: Track a domain's position for a keyword over time.
- name: projects
  description: Saved workspaces; reopen any saved run for $0 from cache.
- name: usage
  description: Per-organization spend, quota, and usage breakdown.
- name: health
  description: Liveness and active-provider probe.
security:
- BearerAuth: []
